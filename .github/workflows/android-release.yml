name: Android Release Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'ionic-app/**'
      - '.github/workflows/android-release.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ionic-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ionic-app/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web assets (production)
        run: npx ng build --configuration production

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Prepare signing files (optional)
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            KEYSTORE_PATH="$PWD/android/app/release-keystore.jks"
            echo "$KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_PATH"
            printf "storeFile=%s\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n" \
              "$KEYSTORE_PATH" "$STORE_PASSWORD" "$KEY_ALIAS" "$KEY_PASSWORD" \
              > android/key.properties
            echo "SIGNING_READY=true" >> $GITHUB_ENV
          else
            echo "SIGNING_READY=false" >> $GITHUB_ENV
          fi

      - name: Build Android App Bundle (signed when secrets provided)
        working-directory: ionic-app/android
        run: |
          chmod +x gradlew
          ./gradlew clean bundleRelease

      - name: Build Android APK (signed when secrets provided)
        working-directory: ionic-app/android
        run: ./gradlew assembleRelease

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: ionic-app/android/app/build/outputs/bundle/release/*.aab

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: ionic-app/android/app/build/outputs/apk/release/*.apk
