spring:
  datasource:
    url: jdbc:h2:file:./data/grocerydb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  auth:
    accept-any-otp: true
    static-otp: ${STATIC_OTP:123456}
  jwt:
    secret: dev-secret-key-dev-secret-key-1234567890
    expiry-minutes: 1440
    refresh-expiry-days: 7
  razorpay:
    key-id: ${RAZORPAY_KEY_ID:rzp_test_replace_me}
    key-secret: ${RAZORPAY_KEY_SECRET:replace_with_test_secret}
  msg91:
    auth-key: ${MSG91_AUTH_KEY:515371AIRutVUf6a01ceaeP1}
    token-auth: ${MSG91_TOKEN_AUTH:515371TBUKkcE2V69fffd1fP1}
    widget-id: ${MSG91_WIDGET_ID:36656b6c7653363134323434}
    trust-all-ssl: true
  store:
    latitude: ${STORE_LATITUDE:26.7333}
    longitude: ${STORE_LONGITUDE:83.8167}
    max-delivery-km: ${STORE_MAX_DELIVERY_KM:9999.0}
  google:
    maps:
      api-key: ${GOOGLE_MAPS_API_KEY:}
  cors:
    allowed-origins: http://localhost:*,http://127.0.0.1:*,http://localhost:4200,http://localhost:8100,http://localhost:8101,http://localhost:8102,http://localhost:65477,http://localhost:65478
