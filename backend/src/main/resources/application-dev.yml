spring:
  datasource:
    url: jdbc:h2:mem:grocerydb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: dev-secret-key-dev-secret-key-1234567890
    expiry-minutes: 1440
    refresh-expiry-days: 7
  cors:
    allowed-origins: http://localhost:4200,http://localhost:8100,http://localhost:8101,http://localhost:8102,http://*:8102
