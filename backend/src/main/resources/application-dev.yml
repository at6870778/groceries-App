spring:
  datasource:
    url: jdbc:h2:file:./data/grocerydb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  auth:
    accept-any-otp: true
    static-otp: ${STATIC_OTP:123456}
  jwt:
    secret: dev-secret-key-dev-secret-key-1234567890
    expiry-minutes: 1440
    refresh-expiry-days: 7
  razorpay:
    key-id: ${RAZORPAY_KEY_ID:rzp_test_replace_me}
    key-secret: ${RAZORPAY_KEY_SECRET:replace_with_test_secret}
  msg91:
    trust-all-ssl: true
  cors:
    allowed-origins: http://localhost:*,http://127.0.0.1:*,http://localhost:4200,http://localhost:8100,http://localhost:8101,http://localhost:8102,http://localhost:65477,http://localhost:65478
