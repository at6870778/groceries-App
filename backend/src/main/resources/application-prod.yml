spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=true&serverTimezone=UTC
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      auto-commit: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          batch_size: 25
          fetch_size: 50
        order_updates: true
        order_inserts: true
        format_sql: false
  flyway:
    enabled: true
    out-of-order: true

server:
  port: ${APP_PORT:8080}
  forward-headers-strategy: framework

logging:
  level:
    root: INFO
    org.springframework.security: INFO

app:
  jwt:
    secret: ${JWT_SECRET}
    expiry-minutes: ${JWT_EXPIRY_MINUTES:129600}
    refresh-expiry-days: ${JWT_REFRESH_EXPIRY_DAYS:90}
  auth:
    accept-any-otp: ${ACCEPT_ANY_OTP:false}
    static-otp: ${STATIC_OTP:123456}
  msg91:
    auth-key: ${MSG91_AUTH_KEY}
    token-auth: ${MSG91_TOKEN_AUTH}
    widget-id: ${MSG91_WIDGET_ID}
    trust-all-ssl: false
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME}
    api-key: ${CLOUDINARY_API_KEY}
    api-secret: ${CLOUDINARY_API_SECRET}
  store:
    latitude: ${STORE_LATITUDE:26.7333}
    longitude: ${STORE_LONGITUDE:83.8167}
    max-delivery-km: ${STORE_MAX_DELIVERY_KM:15.0}
  google:
    maps:
      api-key: ${GOOGLE_MAPS_API_KEY:}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  firebase:
    service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:/secrets/firebase-service-account.json}
