spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=true&serverTimezone=UTC
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          batch_size: 25
        order_updates: true
        order_inserts: true
  flyway:
    enabled: true

server:
  port: ${APP_PORT:8080}
  forward-headers-strategy: framework

logging:
  level:
    root: INFO
    org.springframework.security: INFO

app:
  jwt:
    secret: ${JWT_SECRET}
    expiry-minutes: ${JWT_EXPIRY_MINUTES:1440}
    refresh-expiry-days: ${JWT_REFRESH_EXPIRY_DAYS:30}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
