server:
  port: ${APP_PORT:8080}

spring:
  application:
    name: grocery-backend
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:grocery_mvp}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-long-random-string-of-at-least-32-bytes}
    expiry-minutes: ${JWT_EXPIRY_MINUTES:1440}
    refresh-expiry-days: ${JWT_REFRESH_EXPIRY_DAYS:30}
  razorpay:
    key-id: ${RAZORPAY_KEY_ID:}
    key-secret: ${RAZORPAY_KEY_SECRET:}
  msg91:
    auth-key: ${MSG91_AUTH_KEY:}
    widget-id: ${MSG91_WIDGET_ID:}
    template-id: ${MSG91_TEMPLATE_ID:}
    sender-id: ${MSG91_SENDER_ID:KHNAGO}
    country-code: ${MSG91_COUNTRY_CODE:91}
  auth:
    accept-any-otp: ${ACCEPT_ANY_OTP:false}
    static-otp: ${STATIC_OTP:123456}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*,http://localhost:4200,http://localhost:8100,http://localhost:65477}
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}
  store:
    latitude: ${STORE_LATITUDE:0.0}
    longitude: ${STORE_LONGITUDE:0.0}
  google:
    maps:
      api-key: ${GOOGLE_MAPS_API_KEY:}
