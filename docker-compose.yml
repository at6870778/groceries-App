services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-grocery_mvp}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./backend
    depends_on:
      - mysql
    environment:
      DB_HOST: mysql
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-grocery_mvp}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-root}
      JWT_SECRET: ${JWT_SECRET:-changeme-secret-32-chars-minimum}
      JWT_EXPIRY_MINUTES: ${JWT_EXPIRY_MINUTES:-1440}
      JWT_REFRESH_EXPIRY_DAYS: ${JWT_REFRESH_EXPIRY_DAYS:-30}
      MSG91_AUTH_KEY: ${MSG91_AUTH_KEY:-515371AIRutVUf6a01ceaeP1}
      MSG91_TOKEN_AUTH: ${MSG91_TOKEN_AUTH:-515371TBUKkcE2V69fffd1fP1}
      MSG91_WIDGET_ID: ${MSG91_WIDGET_ID:-36656b6c7653363134323434}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://orderkro.in,https://www.orderkro.in,https://admin.orderkro.in,capacitor://localhost,http://localhost,https://localhost,ionic://localhost}
      ACCEPT_ANY_OTP: ${ACCEPT_ANY_OTP:-false}
      STATIC_OTP: ${STATIC_OTP:-123456}
      APP_PORT: ${APP_PORT:-8080}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-dbwtaon6r}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-388313319841217}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-lYgIjNDWQzOPkk0gIK9SWbT7AE8}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      STORE_LATITUDE: ${STORE_LATITUDE:-26.7333}
      STORE_LONGITUDE: ${STORE_LONGITUDE:-83.8167}
      STORE_MAX_DELIVERY_KM: ${STORE_MAX_DELIVERY_KM:-50.0}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
    ports:
      - "8080:8080"

  admin-panel:
    build: ./admin-panel
    ports:
      - "4200:80"

volumes:
  mysql_data:
