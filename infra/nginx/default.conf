server {
    listen 80;
    server_name _;

    # Allow file uploads up to 20 MB (default 1 MB causes nginx to return 413
    # before the request reaches Spring Boot, appearing as a CORS error)
    client_max_body_size 20m;

    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Forward CORS headers from upstream; also ensure error responses include
        # the header so the browser reports the real status code, not a CORS failure
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Credentials true always;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
